  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0009_WYG_001-1a, image: WYG1035/WYG1035-0508c.png}
body:
  text: 明皇雜録卷上唐鄭處誨撰開元中房琯之宰盧氏也邢真和璞自太山來房琯虚心禮敬因與攜手閒步不覺行數十里至夏谷村遇一廢佛堂松竹森映和璞坐松下以杖叩地令侍者掘深數尺得一缾缾中皆是婁師得與永公書和璞笑謂曰省此乎房遂灑然方記其為僧時永公即房之前身也和璞謂房曰君殁之時必因食魚鱠既殁之後當以梓木為棺然不得殁于君之私第不處公館不處𤣥壇佛寺不處親友之家其後譴于閬州寄居州之紫極宫卧疾數日使君忽具鱠邀房于郡齋房亦欣然命駕食竟而歸暴卒州主命攅櫝于宫中棺得梓木為之開元末杭州有孫生者善相人因至睦州郡守令遍相僚吏時房琯為司户崔渙自萬年縣尉貶桐廬丞孫生曰二君位皆至台輔然房神器大寳合在掌握中崔後合為杭州刺史某雖不見亦合蒙其恩惠既而房以宰輔齎冊書自蜀往靈武授肅宗崔後果為杭州刺史下車訪孫生即已亡旬日矣署其子為牙將以粟帛賑䘏其家開元中上急於為理尤注意于宰輔常欲用張嘉貞為相而忘其名夜令中人持燭於省中訪其直宿者使還奏中書侍郎韋抗上即令召入寢殿上曰朕欲命一相常記得風標為當時重臣今為北方侯伯不欲訪左右旬日念之終忘其名卿試言之抗奏曰張齊丘今為朔方節度上即令草詔仍令宫人持燭抗跪於御前援筆而成上甚稱其敏捷典麗因促命寫詔勅抗歸宿省中上不解衣以待且將降其詔書夜漏未半忽有中人復促抗入見上迎謂曰非張齊丘乃太原節度張嘉貞别命草詔上謂抗曰維朕志先定可以言命矣適朕因閲近日大臣章疏首舉一通乃嘉貞表也因此灑然方記得其名此亦天啓非人事也上嘉其得人復歎用捨如有人主張蘇頲聰悟過人日誦數千言雖記覽如神而父瓌訓勵嚴至常令衣青布襦伏於牀下出其頸受榎楚及壯而文學該博冠於一時性疎俊嗜酒及𤣥宗既平内難將欲草制書難其人顧謂瓌曰誰可為詔試為思之瓌曰臣不知其他臣男頲甚敏捷可備指使然嗜酒幸免沾醉足以了其事𤣥宗遽命召來至時宿酲未解粗備拜舞嘗醉嘔殿下命中人卧於御前𤣥宗親為舉衾以覆之既醒受簡筆立成才藻縱横詞理典贍𤣥宗大喜撫其背曰知子莫若父有如此邪由是器重己注意於大用矣韋嗣立拜中書令瓌署官告頲為之辭薛稷書時人謂之三絶頲纔能言有京兆尹過瓌命頲詠尹字乃曰丑雖有足甲不全身見君無口知伊少人瓌與東明觀道士周彦雲素相往來周時欲為師建立碑碣謂瓌曰成某志不過煩相君諸子五郎文六郎書七郎致石瓌大笑口不言而心服其公瓌子頲第五詵第六氷第七詵善八分書𤣥宗御勤政樓大張樂羅列百伎時教坊有王大娘者善戴百尺竿竿上施木山狀瀛洲方丈令小兒持絳節出入于其間歌舞不輟時劉晏以神童為秘書正字年十嵗形狀獰劣而聰悟過人𤣥宗召于楼上簾下貴妃置于膝上為施粉黛與之巾櫛𤣥宗問晏曰卿為正字正得幾字晏曰天下字皆正唯朋字未正得貴妃復令詠王大娘戴竿晏應聲曰樓前百戱競争新唯有長竿妙入神誰謂綺羅翻有力猶自嫌輕更著人𤣥宗與貴妃及諸嬪御歡笑移時聲聞于外因命牙笏及黄文袍以賜之楊國忠之子暄舉明經禮部侍郎逹奚珣考之不及格將黜落懼國忠而未敢定時駕在華清宫珣子撫為㑹昌尉珣遽召使以書報撫令候國忠具言其狀撫既至國忠私第五鼔初起列火滿門將欲趨朝軒蓋如市國忠方乗馬撫因趨入謁于燭下國忠謂其子必在選中撫益微笑意色甚歡撫乃白曰奉大人命相君之子試不中然不敢黜退國忠却立大呼曰我兒何慮不富貴豈藉一名為鼠輩所賣耶不顧乗馬而去撫惶駭遽奔告于珣曰國忠恃勢倨貴使人之慘舒出于咄嗟奈何與挍其曲直因致暄于上第既而户部侍郎珣纔自禮部侍郎轉吏部侍郎與同列暄話于所親尚歎已之淹徊而謂珣遷改疾速蕭頴士開元二十三年及第恃才傲物漫無與比常自攜一壺逐勝郊野偶憇于逆旅獨酌獨吟㑹有風雨暴至有紫衣老人領一小童避雨於此頴士見其散冗頗肆陵侮逡巡風定雨霽車馬卒至老人上馬呼殿而去頴士倉忙覘之左右曰吏部王尚書尚書名丘頴士常造門未之面極驚愕明日具長牋造門謝丘命引至廡下坐責之且曰所恨與子非親屬當庭訓之耳頃曰子負文學之名踞忽如此止于一第乎頴士終揚州功曺潤州刺史韋詵自以旅望清華嘗求子壻雖門地貴盛聲名藉甚者詵悉以為不可遇嵗除日閒無事妻孥登城眺覧見數人方于園圃有所瘞詵異之召吏指其所訪求焉吏還白曰所見乃參軍裴寛所居也令與寛俱來詵話其由寛曰某常自許義不以苞苴汚其家今日有人遺鹿置之而去既不能自欺因與家僮瘞于後園以全其所守不謂太守見之詵因降階曰某有息女願授君子裴拜謝而去歸謂其妻曰嘗求佳壻今果得之妻問其誰即向之城上所見瘞物者明日復召來韋氏舉家視其簾下寛衣碧衫疎瘦而長舊制八品以下衣碧入門其家大噱呼為鸛鵲詵妻涕泣于帷下既退詵謂其妻曰愛其女當令作賢公侯之妻彼白如瓠者人奴之材耳詵竟以女妻之而韋氏與寛偕老其福夀貴盛親族莫有比焉故開元天寶推名家舊望以寛為稱首姚元崇與張説同為宰輔頗疑阻屢以其相侵張銜之頗切姚既病誡諸子曰張丞相與我不叶釁隙甚深然其人少懐奢侈尤好服玩吾身殁之後以吾嘗同寮當來弔汝其盛陳吾平生服玩寳𢃄重器羅列於帳前若不顧汝速計家事舉族無𩔖矣目此吾屬無所虞便當録其玩用致于張公仍以神道碑為請既獲其文登時便冩進仍先礱石以待之便令鐫刻張丞相見事遲于我數日之後必當悔若却徴碑文以刋削為辭當引使視其鐫刻仍告以聞上訖姚既殁張果至目其玩服三四姚氏諸孤悉如教誡不數日文成叙述該詳時為極筆其畧曰八柱承天髙明之位列四時成嵗亭毒之功存後數日果使使取文本以為詞未周宻欲重為删改姚氏諸子乃引使者示其碑且告以奏御使者復命悔恨拊膺曰死姚崇猶能筭生張説吾今知才之不及也逺矣李適之既貴且豪常列鼎于前以具膳羞一旦庭中鼎躍出相鬬家僮告適之乃往其所酹酒自誓而鬬亦不解鼎耳及足皆落明日適之罷知政事拜太子少保時人知其禍未止也俄為李林甫所陷貶宜春太守適之男霅為衛尉少卿亦貶巴陵郡别駕適之至州不旬月而終時人以林甫迫殺之霅乃迎喪至都李林甫怒未已令人誣告於河南府杖殺之適之好飲退朝後即速賔朋親戚談話賦詩曽不備于林甫初適之在相位日曽賦詩曰朱門長不備親友恣相過今日過五十不飲復如何及罷相作詩曰避賢初罷相樂聖且銜盃借問門前客今朝幾箇來及死非其罪時人寃歎之李林甫宅亦屢有怪妖其南北隅溝中有火光大起或有小兒持火出入林甫惡之奏于其地立嘉猶觀林甫將疾晨起將朝命取書嚢即常時所要事目也忽覺書囊頗重於常侍者開視之即有二鼠出焉投于地即變為狗蒼色壯大雄目張牙仰視林甫命弓射之殷然有聲狗形即滅林甫惡之稱疾不朝其日遂病不踰月而卒唐天后嘗朝諸皇孫坐於殿上觀其嬉戯命取西國所貢玉環釧盃盤列于前後縱令爭取以觀其志莫不奔競厚有所獲獨𤣥宗端坐略不為動后大竒之撫其背曰此兒當為太平天子命取玉龍子以賜玉龍子太宗于晉陽宫得之文徳皇后常置之衣箱中及大帝載誕之三日後以朱絡衣褓并玉龍子賜焉其後常藏之内府雖其廣不數寸而温潤精巧非人間所有及𤣥宗即位每京師愆雨必䖍誠祈禱將有霖注逼而視之若奮鱗鬛開元中三輔大旱𤣥宗復祈禱而涉旬無雨帝宻投南内之龍池俄而雲物暴起風雨隨作及幸西蜀車馬次渭水將渡駐蹕于水濵左右侍御或有臨流濯弄者于沙中得之上聞驚喜視之泫然流泣曰此吾昔時所寶玉龍子也自後每夜中光彩輝燭一室上既還京為小黄門攘竊以遺李輔國李輔國常置于櫃中輔國將敗夜聞櫃中有聲開視之已亡其所王鉷之子凖為衛尉少卿出入以鬬雞侍帝左右時李林甫方持權恃勢林甫子岫為將作監亦入侍帷幄岫常為凖所侮而不敢發一言一旦凖盡率其徒過駙馬王瑶私第瑶望塵趨拜凖挾彈命中於瑶巾冠之上因折其玉簪以為笑樂遂致酒張樂永穆公主親御七公主即帝之長女也仁孝端淑頗推於戚里帝特所鍾愛凖既去或有謂瑶曰鼠輩雖恃其父勢然長公主帝愛女君待之或闕帝豈不介意耶曰天子怒無所畏但性命繫七郎安敢不爾時人多呼準為七郎其盛勢横暴人之所畏也如是王毛仲本髙麗人𤣥宗在藩邸與李宜得服勤左右帝皆愛之每侍宴與姜皎同榻坐於帝前既而貴倨恃舊益為不法帝常優容之每遣中官問訊毛仲受命之後稍不如意必恣其凌辱而後遣還髙力士楊思朂忌之頗深而未嘗敢言於帝毛仲妻李氏既誕育三日帝命力士賜以酒食金帛甚厚仍命其子為五品官力士既還帝曰毛仲喜否復有何詞力士曰出其兒以示臣熟眄褓中曰此兒豈不消三品官帝大怒曰往誅韋氏此賊尚持兩端避事不入我未嘗言之今敢以赤子恨我邪由是恩義益衰帝自先天在位後十五年至開府者惟四人后父王仁皎姚崇宋璟王毛仲而已明皇雜録卷上
