body:
  text: 明皇雜録巻下唐鄭處誨撰張九齡在相位有謇諤匪躬之誠𤣥宗既在位年深稍怠庶政每見帝無不極言得失李林甫時方同列聞帝意陰欲中之時欲加朔方節度使牛仙客實封九齡因稱其不可甚不叶帝㫖他日林甫請見屢陳九齡頗懐誹謗於時方秋帝命髙力士持白羽扇以賜將寄意焉九齡惶恐因作賦以獻又為歸燕詩以貽林甫其詩曰海燕何微𦕈乗春亦蹇來豈知泥滓賤只見玉堂開綉户時雙入華軒日幾迴無心與物競鷹隼莫相猜林甫覽之知其必退恚怒稍觧九齡洎裴耀卿罷免之日自中書至月華門將就班列二人鞠躬卑遜林甫處其中抑揚自得觀者竊謂一鵰挾兩俄而詔張裴為左右僕射罷知政事林甫視其詔大怒曰猶為左右丞相邪二人趨就本班林甫目送之公卿以下視之不覺股栗𤣥宗宴於勤政樓下巷無居人宴罷帝猶垂簾以觀兵部侍郎盧絢謂帝已歸宫掖垂鞭案轡横縱樓下絢負文雅之稱而復風標清粹帝一見不覺目送之問左右曰誰近臣具以絢名氏對之帝亟稱其藴藉是時林甫方持權忌能帝左右寵倖未嘗不厚以金帛為賄由是帝之動靜林甫無不知之翌日林甫召絢之子弟謂曰賢尊以素望清崇今南方藉才聖上有交廣之寄可乎若憚遐方即當請老不然以賔詹仍分務東洛亦優賢之命也子歸而具道建議可否于是絢以賔詹為請林甫恐乖衆望出為華州刺史不旬月誣其有疾為郡不理授太子詹事員外安置唐𤣥宗在東洛大酺於五鳯樓下命三百里内縣令刺史率其聲樂來赴闕者或謂令較其勝負而賞罰焉時河内郡守令樂工數百人於車上皆衣以錦綉伏廂之牛蒙以虎皮及為犀象形狀觀者駭目時元魯山遣樂工數十人聮袂歌于蒍于蒍魯山之文也𤣥宗聞而異之徴其詞乃歎曰賢人之言也其後上謂宰臣曰河内之人其在塗炭乎促命徴還而授以散秩每賜宴設酺㑹則上御勤政樓金吾及四軍兵士未明陳仗盛列旗幟皆帔黄金甲衣短後繡袍太常陳樂衛尉張幕後諸蕃酋長就食府縣教坊大陳山車旱船尋橦走索丸劍角抵戯馬鬭雞又令宫女數百飾以珠翠衣以錦繡自帷中出擊雷鼓為破陣樂太平樂上元樂又列大象犀牛入場或拜舞動中音律每正月望夜又御勤政樓觀作樂貴臣戚里官設看樓夜䦨即遣宫女於樓前歌舞以娛之唐開元中樂工李龜年彭年鶴年兄弟三人皆有才學盛名彭年善舞鶴年龜年能歌尤妙製渭川特承顧遇於東都大起第宅僭侈之制踰于公侯宅在東都通逺里中堂制度甲於都下今製晉公移于定鼎門外别墅號緑野堂其後龜年流洛江南每遇良辰勝賞為人歌數闋座中聞之莫不掩泣罷酒即杜甫嘗贈詩所謂岐王宅裏尋常見崔九堂前幾度聞正值江南好風景落花時節又逢君崔九堂殿中監滌中書令湜之第也唐開元闗輔大旱京師闕雨尤甚亟命大臣遍禱于山澤間而無感應上於龍池新剏一殿因召少府監馮紹正令於四壁各畫一龍紹正乃先於四壁畫素龍竒狀蜿蜒如欲振躍繪事未半若風雲隨筆而生上及從官於壁下觀之鱗甲皆濕設色未終有白氣若簾廡間出入於池中波濤洶湧雷電隨起侍御數百人皆見白龍自波際乗雲氣而上俄頃隂雨四布風雨暴作不終日而甘霖遍於畿内安禄山之陷兩京王維鄭䖍張均皆處於賊庭洎冦平俱囚于楊國忠舊宅崔相國圓因召于私第令畫名畫數壁當時皆以圓勲貴莫二望其救援故運思精深頗極能事故皆獲寛典至於貶降必獲善地張説之謫岳州也鬱鬱不樂時宰以説機辨才畧互相排擯蘇頲方當大用而張説與瓌相善張因為五君詠致書封其詩以遺頲戒其使曰候忌日近暮送之使者既至因忌日齎書至頲門下㑹積隂累旬近暮弔客至多説先公寮舊頲因覽詩嗚咽流涕悲不自勝翌日乃上封大陳説忠貞謇諤有功平王室亦人望所屬不宜淪滯於遐方上乃降璽書勞問俄而遷荆州長史陸象先韋嗣立張廷珪賈曽皆以譴逐嵗乆因加甄収頲常以説父之執友事之甚謹而説重其才器深加敬慕焉𤣥宗幸華清宫新廣湯池制作宏嚴安禄山于范陽以白玉石為魚龍鳬雁仍為石梁及石蓮花以獻雕鐫巧妙殆非人功上大悦命陳于湯中又以石梁横亘湯上而蓮花纔出於水際上因幸華清宫至其所􅄙衣將入而魚龍鳬雁皆若奮鱗舉翼狀欲飛動上甚恐遽命撤去其蓮花猶存又嘗于宫中置長湯屋數十間環迴甃以文石為銀鏤漆船及白香木船置于其中至於楫櫓皆飾以珠玉又於湯中壘瑟瑟及丁香為山以狀瀛洲方丈上將幸華清宫貴妃姊妺競車服為一犢車飾以金翠間以珠玉一車之費不下數十萬貫既而重甚牛不能引因復上聞請各乗馬於是競購名馬以黄金為銜䪊組繡為障泥共㑹于國忠宅將同入禁中炳炳照灼觀者如堵自國忠宅至于城東南隅僕御車馬紛紜其間國忠方與客坐于門下指而謂客曰某家起於細微因縁椒房之親以至于是吾今未知税駕之所念終不能致令名要當取樂于富貴耳由是驕奢僭侈之態紛然而昧處滿持盈之道矣太平公主玉葉冠虢國夫人夜光枕楊國忠鎻子帳皆稀代之寶不能計其直楊貴妃姊號虢國夫人恩寵一時大治宅第棟宇之盛舉無與比所居韋嗣立舊宅韋氏諸子方午偃息于堂廡間忽見婦人衣黄羅帔衫降自步輦有侍婢數十人笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏降階曰先人舊廬所未忍舍語未畢有工數百人發東西廂撤其瓦木韋氏諸子乃率家童挈其琴書委于路中而授韋氏隙地十數畝其宅一無所酬虢國中堂既成召匠圬鏝授二百萬償其值而復以金盞瑟瑟三斗為賞後曽有暴風拔𣗳委其堂上已而視之畧無所傷既撤瓦以觀之皆承以木瓦其制作精緻皆此𩔖也虢國每入禁中常乗驄馬使小黄門御紫驄之駿健黄門之端秀皆冠絶一時張果者既於恒州條山常往來汾晉間時人𫝊有長年秘術耆老云為兒童時見之自言數百嵗矣唐太宗髙宗屢徵之不起則天召之出山佯死于妬女廟前時方盛熱須臾臭爛生蟲則天信其死矣後有人於恒州山中復見之果乗一白驢日行數萬里休則重疊之其厚如紙置于巾箱中乗則以水噀之還成驢矣開元二十三年𤣥宗遣通事舍人裴晤馳驛於恒州迎之果對晤氣絶而死晤乃焚香啟請宣天子求道之意俄頃漸蘇晤不敢逼馳還奏之乃命中書舎人徐嶠齎璽書迎之果隨嶠到東都于集賢院安置肩輿入宫備加禮敬𤣥宗因從容謂曰先生得道者何齒髪之衰耶果曰衰朽之嵗無道術可憑故使之然良足耻也今若盡除不猶愈乎因於御前抜去鬢髪撃落牙齒流血溢口𤣥宗甚驚謂曰先生休舎少選晤語俄頃召之青鬢皓齒愈於壯年一日秘書監王迥質太常少卿蕭華嘗同造焉時𤣥宗欲令尚主果未之知也忽笑謂二人曰娶婦得公主甚可畏也迥質與華相視未諭其言俄頃有中使至謂果曰上以玉真公主早嵗好道欲降於先生果大笑竟不承詔二人方悟向來之言是時公卿多往謁或問以方外之事皆詭對之每云余是堯時丙子年人時莫能測也又云堯時為侍中善于胎息累日不食或時但進羙酒及三黄丸𤣥宗留之殿賜之酒辭以山臣飲不過二升有一弟子飲可一斗𤣥宗聞之喜令召之俄一小道士自殿簷飛下年可十六七美姿容㫖趣雅淡謁見上言詞清爽禮貎臻備𤣥宗命坐果曰弟子當侍立於側未宜賜坐𤣥宗目之愈喜遂賜之酒飲及一斗不辭果辭曰不可更賜過度必有所失致龍顔一笑耳𤣥宗又逼賜之酒忽從頂湧出冠子落地化為一榼𤣥宗及嬪御皆驚笑視之已失道士矣但見一金榼在地覆之榼盛一㪷騐之乃集賢院中榼也累試仙術不可窮紀有歸夜光者善視鬼𤣥宗常召果坐於前而勅夜光視之夜光至御前奏曰不知張果安在乎願視察也而果在御前乆矣夜光卒不能見又有邢和璞者有算術每視人則布籌于前未幾已能詳其名氏窮通善惡夭夀前後所算計千數未嘗不析其瑣細𤣥宗竒之久矣及命算果則運籌移時意竭神沮終不能定其甲子𤣥宗謂中貴人髙力士曰我聞神仙之人寒燠不能療其體外物不能凂其中今張果善筭者莫能究其年視思者莫得見其狀神仙豈非真者耶然嘗聞同堇斟飲之者必死若非仙人必敗其質可試以飲也㑹天大雪寒甚𤣥宗命進堇斟賜果果遂舉飲盡三巵醺然有醉色顧謂左右曰此酒非佳味也即偃而寢食頃方寤忽覽鏡視其齒皆斑然焦黒遽命侍童取鐵如意撃其齒盡隨収于衣帶中徐解衣出藥一帖色微紅光瑩果以傅諸齒穴中已而又寢乆之忽寤再引鏡自視其齒已生矣其堅然光白愈於前也𤣥宗方信其靈異謂力士曰得非真神仙乎遂下詔曰恒州張果先生逰方之外者也跡先髙尚心入窅㝠久混光塵應召赴闕莫知甲子之數且謂羲皇上人問以道樞盡㑹其極今則將行朝禮爰申寵命可授銀青光禄大夫賜號通𤣥先生未幾𤣥宗狩於咸陽獲一大鹿稍異常者庖人方饌果見之曰此仙鹿也已滿千嵗昔漢武元狩五年臣曽侍從畋于上林時生獲此鹿既而放之𤣥宗曰鹿多矣時遷代變豈不為獵者所獲乎果曰武帝捨鹿之時以銅牌誌于左角下遂命騐之果獲銅牌二寸許但文字凋暗耳𤣥宗又謂果曰元狩是何甲子至此凡幾年矣果曰是嵗癸亥武帝始開昆明池今甲戌嵗八百五十二年矣𤣥宗命太史氏校其長厯畧無差焉𤣥宗又竒之時又有道士葉法善亦多術𤣥宗問曰果何人耶答曰臣知之然臣言訖即死故不敢言若陛下免冠跣足救臣即得活𤣥宗許之法善曰此混沌初分白蝙蝠精言訖七竅流血僵仆于地𤣥宗遽詣果所免冠跣足自稱其罪果徐曰此兒多口過不譴之恐敗天地間事耳𤣥宗復哀請乆之果以水噀其面法善即時復生其後累陳老病乞歸恒州詔給驛送到恒州天寶初𤣥宗又遣徴召果聞之忽卒弟子葬之後發棺視之空棺而已李遐周者頗有道術唐開元中嘗召入禁中後求出住𤣥都觀唐宰相李林甫嘗往謁之遐周謂曰公存則家泰殁則家亡林甫拜泣求其救觧笑而不答曰戯之耳天寶末禄山豪横跋扈逺近憂之而上意未寤一旦遐周既去不知所之但於其所居壁上題詩數章言禄山僭竊及幸蜀之事時人莫曉後方騐之其末篇曰燕市人皆去函闗馬不歸若逢山下鬼環上繋羅衣燕市人皆去禄山悉幽薊之衆而起也函闗馬不歸者哥舒翰潼闗之敗疋馬不還也若逢山下鬼者馬嵬蜀中驛名也環上繋羅衣者貴妃小字玉環馬嵬時髙力士以羅巾縊之也其所先見皆此𩔖矣開元中朝廷選用羣官必推精當文物既盛英賢出入皆薄居外任雖雄藩大府由中朝冗員而授時以為左遷班景倩自揚州採訪使入為大理少卿路由大梁倪若水為郡守西郊盛設祖席宴罷景倩登舟若水望其行塵謂掾吏曰班公是行何異登仙乎為之騶殿良所甘心黙然良乆方整回駕既而為詩投相府以道其誠其詞為當時所稱賞𤣥宗嘗器重蘇頲欲倚以為相禮遇顧問與羣臣特異欲命相前一日上秘宻不欲令左右知迨夜艾乃令草詔訪于侍臣曰外廷直宿誰遂命秉燭召來至則中書舎人蕭嵩上即以頲姓名授嵩令草制書既成其詞曰國之瓌寳上尋讀三四謂嵩曰頲瓌之子朕不欲斥其父名卿為刋削之上仍命撤帳中屏風與嵩慚懼流汗筆不能下者乆之上以嵩抒思移時必當精宻不覺前席以觀唯改曰國之珍寶他無更易嵩既退上擲其草于地曰虚有其表耳嵩長大多髯上故有是名左右失笑上聞遽起掩其口曰嵩雖才藝非長人臣之貴亦無與比前言戯耳其黙識神覽皆此𩔖也𤣥宗命宇文融為括田使融方恣睢稍不附己者必加誣譖宻奏以為盧從愿廣置田園有地數百頃帝素器重亦倚為相者數矣而又族望官婚鼎盛于一時故帝亦重言其罪但目從愿為多田翁從愿少家相州應明經常從五舉制策三等授夏縣尉自前明經吏部侍郎才十年自吏部員外至侍郎只七個月明皇雜録卷下
