body:
  text: 明皇􅇎錄小説家𩔖一雜事之屬提要臣等謹案明皇雜錄二卷别錄一卷唐鄭處誨撰處誨字延美滎陽人宰相餘慶之孫太和八年登進士第官至檢校刑部尚書宣武軍節度使事迹附見舊唐書鄭餘慶傳是書成於大中九年載所聞雜事案史稱處誨為校書郎時撰次明皇雜錄三篇行於世晁公武讀書志則載明皇雜錄二卷然又曰别錄一卷題補闕所載十二事則史併别錄數之晁氏析别錄數之也葉夢得避暑錄話曰鄭處誨明皇雜錄記張曲江與李林甫争牛仙客實封時方秋上命髙力士以白羽扇賜之九齡惶恐作賦以獻意若言明皇以忤旨將廢黜故方秋賜扇以見意新書取載之本傳據曲江集賦序曰開元二十四年盛夏奉勅大將軍髙力士賜宰相白羽扇九齡與焉則非秋賜且通言宰相則林甫亦在不獨為曲江而設也乃知小説記事茍非耳目親接安可輕書耶云云則處誨是書亦不盡實錄然小説所記真偽相恭自古已然不獨處誨在博考而慎取之固不能因一二事之失實遂廢此一書也避暑錄話又曰盧懐慎好儉家無珠玉錦繡之飾此固善事然史言妻子至寒餓宋璟等過之門不施箔風雨至引席自障則恐無此理此事盖出鄭處誨明皇雜錄而史臣妄信之云云今本無此一條然則已有所佚脱非完帙矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6518d74dca68e142636a06e67cec6534253a150356a103eb5f243b2a91d7c115
