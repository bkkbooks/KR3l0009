body:
  text: 明皇雜録補遺唐鄭處晦撰高力士既譴于巫山丹谷多薺而人不食力士感之因為詩寄意兩京作斤賣五溪無人採地利雖有殊氣味終不改其後㑹赦歸至武溪道遇開元中羽林軍士坐事謫嶺南停車訪舊方知上皇已厭世力士北望號泣嘔血而死天寶末羣賊陷兩京大掠文武朝臣及黃門宫嬪樂工騎士每獲數百人以兵仗嚴衛送于雒陽至有逃于山谷者而卒能羅捕追脅授以冠帶祿山尤致意樂工求訪頗切于旬日獲梨園弟子數百人羣賊因相與大㑹于凝碧池宴僞官數十人大陳御庫珍寶羅列于前後樂既作梨園舊人不覺歔欷相對泣下羣逆皆露刃持滿以脅之而悲不能已有樂工雷海清者投樂器于地西向慟哭逆黨乃縛海清于戲馬殿支解以示衆聞之者莫不傷痛王維時為賊拘于菩提寺中聞之賦詩曰萬户傷心生野烟百官何日更朝天秋槐落葉空宫裏凝碧池頭奏管絃唐天寶中有孫甑生者深于道術𤣥宗召至京師甑生善輳石纍卵折草為人馬乘之東西馳走太真妃特樂其術數召入宫試之及祿山之亂不知所之唐開元中有僧義福者上黨人也梵行精修相好端潔縉紳士庶翕然歸依嘗從駕往東都所厯郡縣人皆傾向檀施巨萬皆委之而去忽一旦召其學徒告已將終兵部侍郎張均中書侍郎嚴挺之刑部侍郎房琯禮部侍郎韋陟常所禮謁是日亦同造焉義福乃升座為門徒演法乃曰吾沒于是日當以訣别耳久之張謂房曰某宿歲餌金丹邇來未嘗臨喪言訖張遂潛去義福忽謂房曰某與張公遊有數年矣張有非常之咎名節皆虧向來若終法㑹足以免難惜哉乃攜房之手曰必為中興名臣公其勉之言訖而終及祿山之亂張均陷賊庭授僞署房琯贊兩朝竟立大節僧一行姓張氏巨鹿人本名遂唐𤣥宗既召見謂曰卿何能對曰唯善記覽𤣥宗因詔掖庭取宫人籍以示之周覽既畢覆其本記念精熟如素所習讀數幅之後𤣥宗不覺降御榻為之作禮呼為聖人先是一行既從釋氏師事普寂于嵩山師嘗設食于寺大㑹羣僧及沙門居數百里者皆如期而至且聚千餘人時有盧鴻者道髙學富𨼆於嵩山因請鴻為文讃歎其㑹至日鴻持其文至寺其師授之致於几案上鐘梵既作鴻請普寂曰某為文數千言況其字僻而言怪盍於羣僧中選其聰悟者鴻當親為𫝊授乃令召一行既至伸紙微笑止於一覽復致於几上鴻輕其疏脫而竊怪之俄而羣僧㑹於堂一行攘袂而進抗音興裁一無遺忘鴻驚愕久之謂寂曰非君所能教導也當縱其遊學一行因窮大衍自此訪求師資不逺千里嘗至天台國清寺見一院古松數十步門有流水一行立於門屏間聞院中僧於庭布算其聲簌簌既而謂其徒曰今日當有弟子求吾算法已合到門豈無人導達耶即除一算又謂曰門前水合却西流弟子當至一行承言而入稽首請法盡授其術焉而門水舊東流忽改為西流矣邢和璞嘗謂尹愔曰一行其聖人乎漢之洛下閎造大衍厯云後八百歲當差一日則有聖人定之今年期畢矣而一行造大衍厯正在差謬則洛下閎之言信矣一行又嘗詣道士尹崇借揚雄太𤣥經數日復詣崇還其書崇曰此書意旨深逺吾尋之積年尚不能曉吾子試更研求何遽見還也一行曰究其義矣因出所撰大衍𤣥圗及義訣一卷以示崇崇大嗟伏謂人曰此後生顔子也初一行幼時家貧鄰有王姥者家甚殷富竒一行不惜金帛常前後濟之約數十萬一行常思報之至開元中一行承𤣥宗敬遇言無不可未幾㑹王姥兒犯殺人獄未具姥詣一行求救一行曰姥要金帛當十倍酬也君上執法難以情求如何王姥㦸手大罵曰何用識此僧一行從而謝之終不顧一行心計渾天寺中工役數百乃命空其室內徙一大甕于中央密選常住奴二人授以布囊謂曰某坊某角有廢園汝向中潛伺從午至昏當有物入來其數七者可盡掩之失一則杖汝如言而往至酉後果有羣豕至悉獲而歸一行大喜令置甕中覆以木蓋封以六一泥朱題梵字數十其徒莫測詰朝中使叩門急召至便殿𤣥宗迎問曰太史奏昨夜北斗不見是何祥也師有以禳之乎一行曰後魏時失熒惑至今帝車不見古所無者天將大警於陛下也夫匹夫匹婦不得其所則殞霜赤旱盛德所感乃能退舍感之切者其在葬枯出繫乎釋門以瞋心壞一切喜慈心降一切魔如臣曲見莫若大赦天下𤣥宗從之又其夕太史奏北斗一星見凡七日而復至開元末裴寬為河南尹深信釋氏師事普寂禪師日夕造焉居一日寬詣寂寂云方有少事未暇款語且請遲回休憩也寬乃屏息止於空室見寂潔滌正堂焚香端坐坐未久忽聞叩門連云太師一行和尚至矣一行入詣寂作禮禮訖附耳密語其貌絶恭寂但頷云無不可者一行語訖降階入南室自闔其户寂乃徐命弟子云遣鍾一行和尚滅度矣左右疾走視之一如其言滅度後寬乃服衰絰葬之自徒步出城送之唐𤣥宗既用牛仙客為相頗憂時議不叶因訪於髙力士用仙客相外議以為如何力士曰仙客出於胥吏非宰相器上大怒曰即當康𧦬蓋上一時恚怒之詞舉其極不可者或有竊報以為上之於𧦬恩渥頗深行當為相矣𧦬聞之以為信然翼日盛服趨朝既就列延頸北望冀有成命觀之者無不掩口然時論亦以長者目焉𧦬為將作大匠多巧思尤能知地常謂人曰我居是宅中不為宰相耶聞之者益為􅥾笑𤣥宗嘗命教舞馬四百蹄各為左右分為部目為某家寵某家驕時塞外亦有善馬來貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金銀飾其鬃鬛間雜珠玉其曲謂之傾杯樂者數十回奮首鼓尾縱橫應節又施三層板牀乘馬而上旋轉如飛或命壯士舉一榻馬舞於榻上樂工數人立左右前後皆衣淡黃衫文玉帶必求少年而姿貌美秀者每千秋節命舞於勤政樓下其後上既幸蜀舞馬亦散在人間祿山常觀其舞而心愛之自是因以數匹賣於范陽其後轉為田承嗣所得不之知也雜之戰馬置之外棧忽一日軍中享士樂作馬舞不能已厮養皆謂其為妖擁篲以擊之馬謂其舞不中節抑揚頓挫猶存故態吏遽以馬怪白承嗣命箠之甚酷馬舞甚整而鞭撻愈加竟斃於櫪下時人亦有知其舞馬者懼暴而終不敢言唐𤣥宗自蜀回夜闌登勤政樓憑闌南望烟雲滿目上因自歌曰庭前琪樹已堪攀塞外征夫久未還蓋盧思道之詞也歌歇上問有舊人乎逮明為我訪來翼日力士潛求於里中因召與同至則果梨園子弟也其夜上復與乘月登樓唯力士及貴妃侍者紅桃在焉遂命歌涼州詞貴妃所製上親御玉笛為之倚曲曲罷相覩無不掩泣上因廣其曲今涼州𫝊於人間者益加怨切焉至德中明皇復幸華清宫父老奉迎壺漿塞路時上春秋已高常乘步輦父老進曰前時上皇過此常逐從禽今何不為上曰吾老矣豈復堪此父老士女聞之莫不悲泣新豐市有女伶曰謝阿蠻善舞淩波曲常入宫中楊貴妃遇之甚厚亦遊於國忠及諸姨宅明皇既幸蜀西南行初入斜谷屬霖雨涉旬於棧道雨中間鈴音與山相應上既悼念貴妃採其聲為雨霖鈴曲以寄恨焉時梨園子弟善觱篥者張野狐為第一此人從至蜀上因以其曲授野狐洎至德中車駕復幸清華宫從官嬪御多非舊人上於望京樓下命野狐奏雨霖鈴曲未半上四顧凄涼不覺流涕左右感動與之歔欷其曲今𫝊於法部天寶中諸公主相效進食上命中宫袁思藝為檢校進食使水陸珍羞數千盤之費蓋中人十家之産中書舍人竇華嘗因退朝遇公主進食方列於通衢乃𫝊呵按轡行於其間宫苑小兒數百人奮梃而前華僅以身免武惠妃生日上與諸公主按舞於萬歲樓下上乘步輦從復道窺見衛士食畢以餅柑棄水竇中上大怒命高力士杖殺之上方震怒左右無敢言者寧王從容請上曰從復道窺見諸衛士之小過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地奈何性命至重輕於殘飱者乎上蹶然悟遽命赦之杜甫後漂寓湘潭間旅於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂置牛炙白酒以遺甫飲過多一夕而卒集中猶有贈聶耒陽詩也明皇雜録補遺
