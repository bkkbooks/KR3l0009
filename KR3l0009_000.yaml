body:
  text: 明皇雜録小說家類一雜事之屬提要臣等謹案明皇雜録二卷别録一卷唐鄭處誨撰處誨字延美滎陽人宰相餘慶之孫太和八年登進士第官至檢校刑部尚書宣武軍節度使事迹附見舊唐書鄭餘慶傳是書成於大中九年載所聞雜事案史稱處誨為校書郎時撰次明皇雜録三篇行於世朝公武讀書志則載明皇雜録二卷然又曰别録一卷題補闕所載十二事則史併别録數之朝氏析别録數之也葉夢得避暑録話曰鄭處誨明皇雜録記張曲江與李林甫爭牛仙客實封時方秋上命髙力士以白羽扇賜之九齡惶恐作賦以獻意若言明皇以忤旨將廢黜故方秋賜扇以見意新書取載之本傳據曲江集賦序曰開元二十四年盛夏奉敕大將軍髙力士賜宰相白羽扇九齡與焉則非秋賜且通言宰相則林甫亦在不獨為曲江而設也乃知小說記事茍非耳目親接安可輕書耶云云則處誨是書亦不盡實録然小說所記真僞相恭自古已然不獨處誨在博考而慎取之固不能因一二事之失實遂廢此一書也避暑録話又曰盧懷慎好儉家無珠玉錦繡之飾此固善事然史言妻子至寒餓宋璟等過之門不施箔風雨至引席自障則恐無此理此事蓋出鄭處誨明皇雜録而史臣妄信之云云今本無此一條然則已有所佚脫非完帙矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:06df915d9adfc78cd82da319e28835763505a2a278fe27ab60009a87b2f73352
